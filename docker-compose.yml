version: '3.8'

services:
  tududi:
    image: chrisvel/tududi
    container_name: tududi-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${TUDUDI_PORT:-3000}
      LOG_LEVEL: ${TUDUDI_LOG_LEVEL:-info}
      TUDUDI_USER_EMAIL: ${TUDUDI_USER_EMAIL:-admin}
      TUDUDI_USER_PASSWORD: ${TUDUDI_USER_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mcp-tududi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-tududi
    ports:
      - "8080:8080"
    depends_on:
      tududi:
        condition: service_healthy
    environment:
      TUDUDI_API_URL: ${TUDUDI_API_URL:-http://tududi:3000}
      TUDUDI_API_KEY: ${TUDUDI_API_KEY:-}
      TUDUDI_EMAIL: ${TUDUDI_EMAIL:-}
      TUDUDI_PASSWORD: ${TUDUDI_PASSWORD:-}
      HTTP_PORT: ${HTTP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
